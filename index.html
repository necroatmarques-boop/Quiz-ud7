let juego=[], i=0, ok=0;
let tiempo = TIEMPO_TOTAL;
let intervalo;

function iniciar(){
  i=0; ok=0; tiempo=TIEMPO_TOTAL;
  juego = preguntas.sort(()=>Math.random()-0.5).slice(0,POR_PARTIDA);

  document.getElementById("progress").innerHTML =
    Array.from({length:POR_PARTIDA},()=>'<div class="square"></div>').join("");

  clearInterval(intervalo);
  intervalo = setInterval(tick,1000);

  mostrar();
}

function tick(){
  tiempo--;
  const m = String(Math.floor(tiempo/60)).padStart(2,'0');
  const s = String(tiempo%60).padStart(2,'0');
  document.getElementById("timer").textContent = `${m}:${s}`;
  if(tiempo<=0) mostrarResultado();
}

function mostrar() {
  const app = document.getElementById("app");
  if (i >= juego.length) { mostrarResultado(); return; }
  
  const p = juego[i];
  // Mezcla la respuesta correcta (a) con las incorrectas (i)
  const opciones = [p.a, ...p.i].sort(() => Math.random() - 0.5);
  
  let h = `<div class="card"><h3>${i + 1}. ${p.q}</h3>`;
  opciones.forEach(op => {
    h += `<button onclick="responder(this, '${p.a.replace(/'/g, "\\'")}')">${op}</button>`;
  });
  app.innerHTML = h + "</div>";
}

function responder(btnElegido, respuestaCorrecta) {
  const botones = document.querySelectorAll("button");
  botones.forEach(b => b.disabled = true);

  const sq = document.querySelectorAll(".square")[i];
  const esCorrecto = btnElegido.innerText === respuestaCorrecta;

  if (esCorrecto) {
    btnElegido.classList.add("correct");
    sq.classList.add("ok");
    ok++;
    setTimeout(() => { i++; mostrar(); }, 1200);
  } else {
    btnElegido.classList.add("incorrect");
    btnElegido.innerText = "¡INÚTIL! ❌"; // El mensaje que pediste
    sq.classList.add("ko");

    // Marca la correcta en verde para que la veas
    botones.forEach(b => {
      if (b.innerText === respuestaCorrecta) b.classList.add("correct");
    });

    // Castigo de 3 segundos
    setTimeout(() => { i++; mostrar(); }, 3000);
    }

    // Castigo de 3 segundos antes de seguir
    setTimeout(() => { i++; mostrar(); }, 3000);
  }
}
  }

  setTimeout(()=>{ i++; mostrar(); },1000);
}

function mostrarResultado() {
  clearInterval(intervalo);
  const porcentaje = (ok / POR_PARTIDA) * 100;
  let mensaje = porcentaje >= 70 ? "¡ESTÁS LISTO!" : "¡ESTUDIA MÁS, INÚTIL!";
  
  document.getElementById("app").innerHTML = `
    <div class="card result">
      <h2>${mensaje}</h2>
      <p style="font-size:40px; font-weight:bold;">${ok} / ${POR_PARTIDA}</p>
      <button onclick="location.reload()">Nueva partida (20 distintas)</button>
    </div>`;
}

iniciar();
</script>
