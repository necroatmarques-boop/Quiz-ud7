<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz UD6 Aparato Digestivo</title>

<style>
body { font-family: Arial, sans-serif; background:#f2f2f2; padding:15px; }
h1 { text-align:center; }

#topbar {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:15px;
}

#progress {
  display:grid;
  grid-template-columns:repeat(20, 1fr);
  gap:4px;
  flex:1;
}

.square {
  height:12px;
  border-radius:3px;
  background:#ccc;
}
.square.ok { background:#28a745; }
.square.ko { background:#dc3545; }

#timer {
  font-weight:bold;
  min-width:60px;
  text-align:right;
}

.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px; }

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#007aff;
  color:white;
}

button.correct { background:#28a745 !important; }
button.incorrect { background:#dc3545 !important; }

.result { text-align:center; font-size:22px; }
</style>
</head>

<body>

<h1>🍽️ Quiz Aparato Digestivo</h1>

<div id="topbar">
  <div id="progress"></div>
  <div id="timer">20:00</div>
</div>

<div id="app"></div>

{q:"¿Qué son glándulas salivales?",o:["Glándulas que producen saliva","Pulmones","Riñones"],c:0},
{q:"¿Función saliva?",o:["Humedecer alimentos e iniciar digestión","Respirar","Filtrar sangre"],c:0},

{q:"¿Qué es malnutrición?",o:["Falta o exceso nutrientes","Respiración","Circulación"],c:0},
{q:"¿Causas malnutrición?",o:["Dieta inadecuada","Respirar","Dormir"],c:0},
{q:"¿Consecuencias malnutrición?",o:["Problemas salud","Mayor oxígeno","Más energía"],c:0},

{q:"¿Qué son trastornos alimentarios?",o:["Alteraciones comportamiento alimentario","Enfermedades pulmonares","Cardíacas"],c:0},
{q:"¿Factores trastornos alimentarios?",o:["Psicológicos sociales biológicos","Respiratorios","Cardíacos"],c:0},

{q:"¿Qué es anorexia?",o:["Restricción extrema alimentos","Exceso comida","Enfermedad pulmonar"],c:0},
{q:"¿Característica anorexia?",o:["Miedo intenso ganar peso","Respiración rápida","Dolor torácico"],c:0},
{q:"¿Riesgos anorexia?",o:["Desnutrición grave","Mayor energía","Mejor digestión"],c:0},

{q:"¿Qué es bulimia?",o:["Atracones y conductas compensatorias","Respiración lenta","Dolor muscular"],c:0},
{q:"¿Comportamiento bulimia?",o:["Atracones y vómitos","Ejercicio","Dormir"],c:0},
{q:"¿Consecuencias bulimia?",o:["Problemas digestivos","Más oxígeno","Mayor absorción"],c:0},

{q:"¿Causa reflujo?",o:["Debilidad esfínter esofágico","Pulmones","Riñones"],c:0},

{q:"¿Bacteria úlcera?",o:["Helicobacter pylori","E.coli","Salmonella"],c:0},

{q:"¿Qué es diarrea?",o:["Evacuación líquida frecuente","Respiración rápida","Dolor muscular"],c:0},
{q:"¿Qué es estreñimiento?",o:["Dificultad evacuar","Respiración lenta","Dolor torácico"],c:0},
{q:"¿Qué es apendicitis?",o:["Inflamación del apéndice","Pulmón","Riñón"],c:0},
{q:"¿Qué es enfermedad Crohn?",o:["Enfermedad inflamatoria intestinal","Pulmonar","Renal"],c:0},
{q:"¿Qué es colitis ulcerosa?",o:["Inflamación crónica colon","Pulmonar","Renal"],c:0},

{q:"¿Qué es cáncer de colon?",o:["Tumor maligno intestino grueso","Pulmonar","Renal"],c:0},
{q:"¿Factor riesgo cáncer colon?",o:["Dieta pobre en fibra","Ejercicio","Hidratación"],c:0},
{q:"¿Síntoma cáncer colon?",o:["Sangre en heces","Tos","Dolor muscular"],c:0},
{q:"¿Prevención cáncer colon?",o:["Dieta saludable","Fumar","Sedentarismo"],c:0},

{q:"¿Función digestión?",o:["Obtener energía y nutrientes","Respirar","Bombear sangre"],c:0},
{q:"¿Importancia absorción?",o:["Permite utilizar nutrientes","Respirar mejor","Producir sangre"],c:0},
{q:"¿Relación alimentación salud digestiva?",o:["Dieta equilibrada mejora digestión","Respirar más","Dormir más"],c:0},
{q:"¿Hábitos aparato digestivo saludable?",o:["Dieta equilibrada agua ejercicio","Fumar","Sedentarismo"],c:0}

];

let juego=[], i=0, ok=0;
let tiempo = TIEMPO_TOTAL;
let intervalo;

function iniciar(){
  i=0; ok=0; tiempo=TIEMPO_TOTAL;
  juego = preguntas.sort(()=>Math.random()-0.5).slice(0,POR_PARTIDA);

  document.getElementById("progress").innerHTML =
    Array.from({length:POR_PARTIDA},()=>'<div class="square"></div>').join("");

  clearInterval(intervalo);
  intervalo = setInterval(tick,1000);

  mostrar();
}

function tick(){
  tiempo--;
  const m = String(Math.floor(tiempo/60)).padStart(2,'0');
  const s = String(tiempo%60).padStart(2,'0');
  document.getElementById("timer").textContent = `${m}:${s}`;
  if(tiempo<=0) mostrarResultado();
}

function mostrar(){
  const app=document.getElementById("app");
  if(i>=juego.length){ mostrarResultado(); return; }
  const p=juego[i];
  let h=`<div class="card"><h3>${i+1}. ${p.q}</h3>`;
  p.o.forEach((op,j)=>h+=`<button onclick="responder(${j})">${op}</button>`);
  app.innerHTML=h+"</div>";
}

function responder(r){
  const botones=document.querySelectorAll("button");
  botones.forEach(b=>b.disabled=true);

  const correcta=juego[i].c;
  const sq=document.querySelectorAll(".square")[i];

  if(r===correcta){
    botones[r].classList.add("correct");
    sq.classList.add("ok");
    ok++;
  } else {
    botones[r].classList.add("incorrect");
    botones[correcta].classList.add("correct");
    sq.classList.add("ko");
  }

  setTimeout(()=>{ i++; mostrar(); },1000);
}

function mostrarResultado(){
  clearInterval(intervalo);
  document.getElementById("app").innerHTML=
    `<div class="card result">
      <h2>Resultado</h2>
      <p>${ok} / ${POR_PARTIDA}</p>
      <button onclick="iniciar()">Nueva partida</button>
    </div>`;
}

iniciar();
</script>

</body>
</html>
