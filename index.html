}

.drop{border:2px dashed #999;padding:10px;margin:5px;min-height:40px;border-radius:5px;}

.racha{text-align:center;font-size:20px;margin-bottom:10px;}

function actualizarContador(){
  document.getElementById("contador").textContent =
  respondidas + " / " + preguntas.length;

  let porcentaje = (respondidas / preguntas.length) * 100;
  document.getElementById("barraGlobal").style.width = porcentaje + "%";
}

function iniciar(){

  if(preguntas.length === 0){
    app.innerHTML = "<div class='card'>⚠️ No hay preguntas</div>";
    return;
  }

  if(!jugador){
    jugador = prompt("Pon tu nombre:");
    localStorage.setItem("jugador", jugador);
  }

  if(pool.length === 0){
    pool = [...preguntas].sort(()=>Math.random()-0.5);
  }

  i=0;
  ok=0;
  racha=0;
  tiempo=TIEMPO_TOTAL;

  juego = pool.slice(indiceGlobal, indiceGlobal + POR_PARTIDA);

  if(juego.length === 0){
    pool = [...preguntas].sort(()=>Math.random()-0.5);
    indiceGlobal = 0;
    respondidas = 0;
    juego = pool.slice(0, POR_PARTIDA);
  }

  indiceGlobal += POR_PARTIDA;

  document.getElementById("progress").innerHTML =
  Array.from({length:POR_PARTIDA},()=>'<div class="square"></div>').join("");

  actualizarContador();

  clearInterval(intervalo);
  intervalo=setInterval(()=>{
    tiempo--;
    document.getElementById("timer").textContent =
    Math.floor(tiempo/60)+":"+String(tiempo%60).padStart(2,'0');
    if(tiempo<=0)resultado();
  },1000);

  mostrar();
}

function mostrar(){

  if(i>=juego.length){resultado();return;}

  let p=juego[i];

  if(p.tipo==="drag"){mostrarDrag(p);return;}

  let ops=[p.a,...p.i].sort(()=>Math.random()-0.5);

  app.innerHTML=`<div class="card">
  <h3>${i+1}. ${p.q}</h3>
  ${ops.map(o=>`<button onclick="responder(this,'${p.a}')">${o}</button>`).join("")}
  </div>`;
}

function responder(btn,resp){

  let botones=document.querySelectorAll("button");
  botones.forEach(b=>b.disabled=true);

  let sq=document.querySelectorAll(".square")[i];

  if(btn.innerText===resp){
    btn.classList.add("correct");
    sq.classList.add("ok");
    ok++;
    racha++;
  }else{
    btn.classList.add("incorrect");
    btn.innerText="INÚTIL ❌";
    sq.classList.add("ko");
    racha=0;

    botones.forEach(b=>{
      if(b.innerText===resp){
        b.classList.add("correct");
      }
    });
  }

  respondidas++;
  actualizarContador();

  document.getElementById("racha").innerHTML =
  racha>=3?`🔥 ${racha}`:"";

  setTimeout(()=>{
    i++;
    mostrar();
  },1200);
}

// DRAG
let dragged;

function mostrarDrag(p){

  app.innerHTML=`<div class="card">
  <h3>${p.q}</h3>
  <img src="${p.img}" style="width:100%">
  ${p.zonas.map(z=>`<div class="drop" data-correct="${z}"></div>`).join("")}
  ${p.opciones.map(o=>`<div class="drag" draggable="true" data-name="${o}">${o}</div>`).join("")}
  <button onclick="checkDrag()">Comprobar</button>
  </div>`;

  document.querySelectorAll(".drag").forEach(d=>{
    d.ondragstart=()=>dragged=d;
  });

  document.querySelectorAll(".drop").forEach(z=>{
    z.ondragover=e=>e.preventDefault();
    z.ondrop=e=>{
      if(!z.firstChild)z.appendChild(dragged);
    };
  });
}

function checkDrag(){

  let correct=0;
  document.querySelectorAll(".drop").forEach(z=>{
    if(z.firstChild && z.firstChild.dataset.name===z.dataset.correct)correct++;
  });

  let sq=document.querySelectorAll(".square")[i];

  if(correct===document.querySelectorAll(".drop").length){
    sq.classList.add("ok");
    ok++;
    racha++;
  }else{
    sq.classList.add("ko");
    racha=0;
  }

  respondidas++;
  actualizarContador();

  setTimeout(()=>{
    i++;
    mostrar();
  },1200);
}

function resultado(){

  clearInterval(intervalo);

  let ranking = JSON.parse(localStorage.getItem("ranking") || "[]");

  ranking.push({
    nombre: jugador,
    aciertos: ok
  });

  ranking.sort((a,b)=>b.aciertos - a.aciertos);
  ranking = ranking.slice(0,10);

  localStorage.setItem("ranking", JSON.stringify(ranking));

  app.innerHTML=`<div class="card">
  <h2>${ok>=14?"🔥 CRACK":"ESTUDIA MÁS INÚTIL"}</h2>
  <p>${ok}/20</p>

  <h3>🏆 Ranking</h3>
  ${ranking.map(r=>`<div>${r.nombre} - ${r.aciertos}</div>`).join("")}

  <button onclick="iniciar()">Siguiente bloque</button>
  </div>`;
}

iniciar();

</script>
